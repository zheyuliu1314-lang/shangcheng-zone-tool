<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>上城区片区分类工具</title>
  <style>
    html,body{margin:0;width:100%;height:100%;font-family:"Microsoft YaHei","PingFang SC",sans-serif;background:#f5f7fb;color:#182230}
    .wrap{height:100%;display:flex;align-items:center;justify-content:center}.card{max-width:560px;margin:24px;padding:28px;background:#fff;border-radius:16px;box-shadow:0 10px 35px #18223018;text-align:center}.card h1{margin:0 0 12px;font-size:24px}.card p{color:#687487;line-height:1.7}.card a{display:inline-block;margin-top:12px;padding:11px 18px;background:#1769e0;color:#fff;text-decoration:none;border-radius:8px}.error{color:#b93434;font-size:13px}
  </style>
</head>
<body>
  <div class="wrap" id="loading"><div class="card"><h1>正在打开片区分类工具</h1><p>正在连接后端服务，请稍候…</p></div></div>
  <script>
    const backend = "__BACKEND_URL__";
    fetch(backend + "/healthz", {headers:{Accept:"application/json"}}).then(r => { if (!r.ok) throw new Error("后端服务不可用"); return r.json(); }).then(() => {
      const frame = document.createElement("iframe");
      frame.src = backend + "/";
      frame.title = "上城区片区分类工具";
      frame.style = "position:fixed;inset:0;width:100%;height:100%;border:0";
      document.body.innerHTML = "";
      document.body.appendChild(frame);
    }).catch(err => {
      document.getElementById("loading").innerHTML = '<div class="card"><h1>后端服务尚未就绪</h1><p>Netlify 页面已经发布，但 Render 后端还没有正常响应。</p><div class="error">'+String(err.message||err)+'</div></div>';
    });
  </script>
</body>
</html>
