<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>上城区片区分类工具</title><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"><link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css"><style>html,body{height:100%;margin:0;font-family:Arial,"Microsoft YaHei"}body{display:flex}.map{flex:1}#map{height:100%}.side{width:390px;padding:16px;overflow:auto;background:#fff;box-shadow:-2px 0 8px #0002}.side h2{margin:0 0 12px}.box{padding:12px;background:#f5f7fb;border-radius:8px;margin:10px 0}.btn{width:100%;padding:9px;margin-top:8px;border:0;border-radius:6px;background:#1769e0;color:#fff;cursor:pointer}.btn:disabled{opacity:.45}.select,.input{width:100%;padding:8px;margin-top:7px;box-sizing:border-box}.status{font-size:12px;color:#657184;line-height:1.6}.notice{padding:9px;background:#eef5ff;border-radius:6px;font-size:12px}.zone{border-left:5px solid;padding:6px;margin:5px 0;background:#f5f7fb}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}.stat{background:#f5f7fb;text-align:center;padding:7px}.stat b{display:block;font-size:18px}.stat small{font-size:11px;color:#657184}</style></head><body><div class="map"><div id="map"></div></div><aside class="side"><h2>上城区片区分类工具</h2><div id="notice" class="notice">正在连接后端……</div><div class="box"><b>1. 绘制片区</b><input id="zn" class="input" placeholder="片区名称"><input id="zc" type="color" value="#2f80ed"><button id="add" class="btn" disabled>添加当前多边形</button><div id="zones"></div><button id="save" class="btn">保存片区</button><button id="load" class="btn">加载片区</button></div><div class="box"><b>2. 上传 Excel</b><input id="file" type="file" accept=".xlsx"><select id="addr" class="select" disabled><option>请先上传文件</option></select><button id="run" class="btn" disabled>开始解析和分类</button><p id="status" class="status">等待上传</p><div class="stats"><div class="stat"><b id="n">0</b><small>总数</small></div><div class="stat"><b id="a">0</b><small>自动通过</small></div><div class="stat"><b id="r">0</b><small>待复核</small></div><div class="stat"><b id="f">0</b><small>无法定位</small></div><div class="stat"><b id="o">0</b><small>片区外</small></div></div><button id="out" class="btn" disabled>下载结果 Excel</button></div></aside><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script><script>
const $=i=>document.getElementById(i),api=(u,o={})=>fetch(u,o).then(async r=>{let d=await r.json().catch(()=>({}));if(!r.ok)throw Error(d.error||'请求失败');return d});let zones=[],current=null,job=null;const group=new L.FeatureGroup(),map=L.map('map').setView([30.245,120.19],13);L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}',{subdomains:'1234',maxZoom:19}).addTo(map);group.addTo(map);map.addControl(new L.Control.Draw({edit:{featureGroup:group},draw:{polygon:{allowIntersection:false},polyline:false,rectangle:false,circle:false,circlemarker:false,marker:false}}));map.on(L.Draw.Event.CREATED,e=>{current=e.layer;group.addLayer(e.layer);$('add').disabled=false});const points=l=>l.getLatLngs()[0].map(p=>[p.lng,p.lat]);function draw(){group.clearLayers();zones.forEach(z=>L.polygon(z.polygon.map(p=>[p[1],p[0]]),{color:z.color,fillOpacity:.2}).addTo(group));$('zones').innerHTML=zones.map(z=>`<div class="zone" style="border-color:${z.color}">${z.name}</div>`).join('')}function msg(t){$('notice').textContent=t}$('add').onclick=()=>{let name=$('zn').value.trim();if(!name||!current)return;zones.push({name,color:$('zc').value,polygon:points(current)});current=null;$('add').disabled=true;$('zn').value='';draw()};$('save').onclick=async()=>{try{await api('/api/zones',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({zones})});msg('片区已保存')}catch(e){msg(e.message)}};$('load').onclick=async()=>{try{zones=(await api('/api/zones')).zones||[];draw();msg('片区已加载')}catch(e){msg(e.message)}};$('file').onchange=async()=>{let f=$('file').files[0],d=new FormData();if(!f)return;d.append('file',f);try{let x=await api('/api/upload',{method:'POST',body:d});job=x.job_id;$('addr').innerHTML=x.headers.map(h=>`<option>${h}</option>`).join('');$('addr').disabled=false;$('run').disabled=false;msg(`已读取 ${x.total} 行，请选择地址列`)}catch(e){msg(e.message)}};$('run').onclick=async()=>{try{await api(`/api/tasks/${job}/geocode`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({addr_col:$('addr').value,name_col:''})});let d;do{await new Promise(x=>setTimeout(x,1000));d=await api(`/api/tasks/${job}`);$('status').textContent=d.message||d.status}while(!['geocoded','classified','reviewed'].includes(d.status));let c=await api(`/api/tasks/${job}/classify`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({zones})}),s=c.summary||{};$('n').textContent=s.total||0;$('a').textContent=s.automatic||0;$('r').textContent=s.review||0;$('f').textContent=s.failed||0;$('o').textContent=s.outside||0;$('out').disabled=false;msg('分类完成')}catch(e){msg(e.message)}};$('out').onclick=()=>location.href=`/api/tasks/${job}/export`;api('/healthz').then(x=>msg(x.gaode_configured?'高德服务已配置':'高德 Key 未配置')).catch(()=>msg('后端连接失败'));$('load').click();</script></body></html>
