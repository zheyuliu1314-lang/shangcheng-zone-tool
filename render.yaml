services:
  - type: web
    name: shangcheng-zone-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120 app:app
    healthCheckPath: /healthz
    envVars:
      - key: GAODE_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: MAX_ROWS
        value: "5000"
